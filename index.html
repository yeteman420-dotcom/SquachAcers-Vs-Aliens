<!DOCTYPE html>
<html>
<head>
    <title>SquachAcers: Invasion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @keyframes pulse {
            0% { text-shadow: 0 0 10px #2E7D32; opacity: 0.1; }
            50% { text-shadow: 0 0 30px #4CAF50, 0 0 50px #2E7D32; opacity: 0.3; }
            100% { text-shadow: 0 0 10px #2E7D32; opacity: 0.1; }
        }
        body { background: #050a05; color: #4CAF50; text-align: center; font-family: 'Arial Black', Gadget, sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #bg-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 10vw; color: #2E7D32; z-index: -1; pointer-events: none;
            animation: pulse 3s infinite ease-in-out; letter-spacing: 5px;
        }
        canvas { background: transparent; display: block; margin: 0 auto; border-bottom: 10px solid #2E7D32; cursor: crosshair; width: 100vw; height: 80vh; }
        .stats { padding: 10px; font-size: 24px; background: #000; display: flex; justify-content: space-around; border-bottom: 2px solid #2E7D32; z-index: 10; position: relative; }
        .msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; display: none; background: rgba(0,0,0,0.9); padding: 40px; border: 3px solid #FF5252; z-index: 20; color: white; }
    </style>
</head>
<body>
    <div id="bg-text">SQUACHACERS</div>
    <div class="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div>TREES: <span id="health">5</span></div>
    </div>
    <div id="gameOver" class="msg">FOREST OVERRUN!<br><br><button style="padding: 15px 30px; font-size: 20px; background: #2E7D32; color: white; border: none; cursor: pointer;" onclick="location.reload()">RETRY ACER</button></div>
    <canvas id="gameCanvas"></canvas>
    <p style="margin-top: 10px;">TAP TO HURL STONES | PROTECT THE LINE</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const healthEl = document.getElementById("health");
        const gameOverEl = document.getElementById("gameOver");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.8;

        let score = 0;
        let health = 5;
        let gameActive = true;
        let stones = [];
        let invaders = [];
        let particles = [];

        class Stone {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                let angle = Math.atan2(targetY - y, targetX - x);
                this.speed = 12;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.size = 10;
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() {
                ctx.fillStyle = "#A9A9A9";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Invader {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -50;
                this.size = 50;
                this.speed = 2 + (score / 15);
                this.color = `hsl(${Math.random() * 40 + 260}, 100%, 70%)`; 
            }
            update() { this.y += this.speed; }
            draw() {
                // Saucer Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size/2, this.size/4, 0, 0, Math.PI*2);
                ctx.fill();
                // Glowing Cockpit
                ctx.fillStyle = "#00FFFF";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00FFFF";
                ctx.beginPath();
                ctx.arc(this.x, this.y - 5, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function spawnInvader() {
            if (gameActive) invaders.push(new Invader());
            let nextSpawn = Math.max(400, 1800 - (score * 40));
            setTimeout(spawnInvader, nextSpawn);
        }

        function explode(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 25, color});
            }
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Squach Launcher (Visual Cue at top)
            ctx.fillStyle = "#2E7D32";
            ctx.beginPath();
            ctx.moveTo(canvas.width/2 - 30, 0);
            ctx.lineTo(canvas.width/2 + 30, 0);
            ctx.lineTo(canvas.width/2, 40);
            ctx.fill();

            stones.forEach((s, si) => {
                s.update();
                s.draw();
                if (s.y > canvas.height || s.x < 0 || s.x > canvas.width || s.y < 0) stones.splice(si, 1);
            });

            invaders.forEach((inv, ii) => {
                inv.update();
                inv.draw();

                stones.forEach((s, si) => {
                    let dist = Math.hypot(s.x - inv.x, s.y - inv.y);
                    if (dist < inv.size/2 + s.size) {
                        explode(inv.x, inv.y, inv.color);
                        invaders.splice(ii, 1);
                        stones.splice(si, 1);
                        score++;
                        scoreEl.innerText = score;
                    }
                });

                if (inv.y > canvas.height) {
                    invaders.splice(ii, 1);
                    health--;
                    healthEl.innerText = health;
                    if (health <= 0) {
                        gameActive = false;
                        gameOverEl.style.display = "block";
                    }
                }
            });

            particles.forEach((p, pi) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life/25;
                ctx.fillRect(p.x, p.y, 5, 5);
                ctx.globalAlpha = 1;
                if (p.life <= 0) particles.splice(pi, 1);
            });

            requestAnimationFrame(update);
        }

        const handleInput = (clientX, clientY) => {
            if (gameActive) stones.push(new Stone(canvas.width/2, 20, clientX, clientY));
        };

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        canvas.addEventListener("mousedown", (e) => {
            handleInput(e.clientX, e.clientY);
        });

        spawnInvader();
        update();
    </script>
</body>
</html>
