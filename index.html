<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SquachAcers: Invasion</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-bright:#FFD700;--dark:#0a0a14;--deep:#050510;--green:#1a3a1a;--alien:#7fff7f;--alien-dark:#00aa44;--red:#ff3333;--sky:#0d1a3a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--deep);font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none;touch-action:none;}
  #gameContainer{position:relative;width:min(500px,100vw);height:min(700px,100vh);overflow:hidden;}
  canvas{width:100%;height:100%;display:block;cursor:crosshair;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px 8px;background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);pointer-events:none;z-index:10;}
  .hud-block{display:flex;flex-direction:column;align-items:center;}
  .hud-label{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:2px;color:var(--gold);opacity:0.8;}
  .hud-value{font-family:'Black Ops One',cursive;font-size:22px;color:#fff;text-shadow:0 0 10px var(--gold);}
  .hud-value.wave{color:var(--gold-bright);font-size:18px;}
  #treesRow{display:flex;gap:5px;align-items:center;}
  .tree-icon{font-size:18px;transition:opacity 0.3s;filter:drop-shadow(0 0 4px #0f0);}
  .tree-icon.dead{opacity:0.15;filter:none;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:20px;text-align:center;}
  #startScreen{background:radial-gradient(ellipse at center,#0d1a3a 0%,#050510 100%);}
  #gameOverScreen{background:rgba(5,5,16,0.95);display:none;overflow-y:auto;}
  #levelScreen{background:rgba(5,5,16,0.97);display:none;}
  .logo{font-family:'Black Ops One',cursive;font-size:38px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold),0 0 60px rgba(201,168,76,0.3);letter-spacing:3px;line-height:1;margin-bottom:4px;}
  .subtitle{font-family:'Black Ops One',cursive;font-size:14px;color:#aaa;letter-spacing:6px;margin-bottom:30px;}
  .bigfoot-art{font-size:80px;margin:10px 0;animation:breathe 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .game-desc{font-size:13px;color:#888;letter-spacing:1px;margin-bottom:20px;line-height:1.6;}
  .btn{font-family:'Black Ops One',cursive;font-size:16px;letter-spacing:3px;padding:14px 40px;border:2px solid var(--gold);background:transparent;color:var(--gold-bright);cursor:pointer;transition:all 0.2s;text-transform:uppercase;position:relative;overflow:hidden;}
  .btn::before{content:'';position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity 0.2s;}
  .btn:hover::before{opacity:0.15;}
  .btn:active{transform:scale(0.96);}
  .over-title{font-family:'Black Ops One',cursive;font-size:42px;color:var(--red);text-shadow:0 0 30px var(--red);margin-bottom:4px;}
  .over-sub{font-size:13px;color:#666;letter-spacing:3px;margin-bottom:12px;}
  .score-display{font-family:'Black Ops One',cursive;font-size:52px;color:var(--gold-bright);text-shadow:0 0 20px var(--gold);margin-bottom:2px;}
  .score-label{font-size:11px;letter-spacing:4px;color:#666;margin-bottom:16px;}
  .level-badge{font-family:'Black Ops One',cursive;font-size:56px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold);animation:pulse 0.6s ease-in-out infinite alternate;}
  @keyframes pulse{from{transform:scale(1);}to{transform:scale(1.05);text-shadow:0 0 50px var(--gold);}}
  .level-desc{font-size:13px;color:#999;letter-spacing:2px;margin:12px 0 28px;line-height:1.7;}
  #stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite alternate;}
  @keyframes twinkle{from{opacity:0.1;}to{opacity:0.8;}}
  #ammoBar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;z-index:10;}
  .ammo-pip{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);transition:all 0.2s;}
  .ammo-pip.empty{background:#222;box-shadow:none;}
  .score-popup{position:absolute;font-family:'Black Ops One',cursive;font-size:18px;color:var(--gold-bright);pointer-events:none;animation:floatUp 0.9s ease-out forwards;z-index:30;text-shadow:0 0 10px var(--gold);}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.3);}}
  #waveBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Black Ops One',cursive;font-size:36px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold);letter-spacing:4px;pointer-events:none;z-index:25;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
  #waveBanner.show{opacity:1;animation:bannerAnim 2s ease forwards;}
  @keyframes bannerAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1);}}
  #highScoreDisplay{font-size:12px;color:#555;letter-spacing:2px;margin-top:6px;}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;margin-bottom:4px;font-family:'Black Ops One',cursive;font-size:13px;letter-spacing:1px;border-left:3px solid transparent;}
  .lb-row.gold{border-color:#FFD700;background:rgba(255,215,0,0.08);}
  .lb-row.silver{border-color:#aaa;background:rgba(200,200,200,0.05);}
  .lb-row.bronze{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
  .lb-row.normal{border-color:#333;background:rgba(255,255,255,0.03);}
  .lb-row.highlight{border-color:#C9A84C;background:rgba(201,168,76,0.15);animation:pulse 1s ease-in-out 3;}
  .lb-rank{color:#C9A84C;width:24px;}
  .lb-name{color:#fff;flex:1;padding:0 8px;}
  .lb-score{color:#FFD700;}
  .lb-wave{color:#555;font-size:10px;margin-left:6px;}
  .lb-title{font-family:'Black Ops One',cursive;font-size:10px;letter-spacing:4px;color:#C9A84C;text-align:center;margin-bottom:8px;opacity:0.8;}
</style>
</head>
<body>
<div id="gameContainer">
  <div id="stars"></div>
  <div id="hud">
    <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-value" id="scoreDisplay">0</div></div>
    <div class="hud-block"><div class="hud-label">TREES</div><div id="treesRow"></div></div>
    <div class="hud-block"><div class="hud-label">WAVE</div><div class="hud-value wave" id="waveDisplay">1</div></div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="ammoBar"></div>
  <div id="waveBanner"></div>
  <div class="screen" id="startScreen">
    <div class="logo">SQUACHACERS</div>
    <div class="subtitle">INVASION</div>
    <div class="bigfoot-art">🦶</div>
    <div class="game-desc">ALIENS ARE ATTACKING THE FOREST<br>HURL STONES. PROTECT THE TREES.<br>SURVIVE THE WAVES.</div>
    <button class="btn" id="startBtn">BEGIN THE HUNT</button>
    <div id="highScoreDisplay">BEST: <span id="hsStart">0</span></div>
  </div>
  <div class="screen" id="levelScreen">
    <div class="hud-label" style="letter-spacing:4px;margin-bottom:8px;">WAVE CLEARED</div>
    <div class="level-badge" id="levelBadge">WAVE 2</div>
    <div class="level-desc" id="levelDesc">Faster aliens incoming.<br>Stay sharp, Acer.</div>
    <button class="btn" id="nextWaveBtn">KEEP HUNTING</button>
  </div>
  <div class="screen" id="gameOverScreen">
    <div class="over-title">OVERRUN</div>
    <div class="over-sub">THE FOREST HAS FALLEN</div>
    <div class="score-display" id="finalScore">0</div>
    <div class="score-label">POINTS SCORED</div>
    <div id="nameEntrySection" style="display:none;flex-direction:column;align-items:center;margin-bottom:16px;">
      <div style="font-family:'Black Ops One',cursive;font-size:11px;letter-spacing:3px;color:#C9A84C;margin-bottom:10px;">NEW HIGH SCORE — ENTER YOUR NAME</div>
      <input id="playerNameInput" type="text" maxlength="12" placeholder="YOUR NAME" style="font-family:'Black Ops One',cursive;font-size:18px;letter-spacing:3px;background:rgba(0,0,0,0.6);border:2px solid #C9A84C;color:#FFD700;padding:10px 16px;text-align:center;outline:none;width:220px;text-transform:uppercase;">
      <button class="btn" id="saveScoreBtn" style="margin-top:12px;padding:10px 28px;font-size:13px;">SAVE SCORE</button>
    </div>
    <div id="leaderboard" style="width:100%;max-width:340px;margin-bottom:20px;"></div>
    <button class="btn" id="retryBtn">RETRY ACER</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, push, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSBF47ibk5F0TCZ1DvwZb7-0cG1BImDd4",
    authDomain: "squachacers.firebaseapp.com",
    databaseURL: "https://squachacers-default-rtdb.firebaseio.com",
    projectId: "squachacers",
    storageBucket: "squachacers.firebasestorage.app",
    messagingSenderId: "305836513755",
    appId: "1:305836513755:web:2d9a412923e817a6ee2ffe"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window._fbListenScores = function(callback) {
    const scoresRef = query(ref(db, 'scores'), orderByChild('score'), limitToLast(10));
    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) { callback([]); return; }
      callback(Object.values(data).sort((a,b) => b.score - a.score));
    });
  };

  window._fbSubmitScore = function(name, score, wave) {
    push(ref(db, 'scores'), {
      name: name.toUpperCase().trim() || 'ACER',
      score, wave, date: Date.now()
    });
  };

  document.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s`;c.appendChild(s);}
})();

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=500,H=700;
canvas.width=W;canvas.height=H;

let state='start',score=0,wave=1,trees=5;
let stones=[],aliens=[],particles=[],explosions=[];
let ammo=5,maxAmmo=5,reloading=false,reloadTimer=0;
let lastTime=0,spawnTimer=0,waveAliens=0,waveKills=0,waveGoal=10;
let squachX=W/2,squachAnim=0,throwing=false,throwAnim=0;
let highScore=parseInt(localStorage.getItem('squach_hs')||'0');
let treeDamageFlash=0,screenShake=0;

function getWaveConfig(w){return{goal:8+w*4,spawnRate:Math.max(0.4,1.8-w*0.12),speed:Math.min(90,28+w*7),hp:Math.min(5,1+Math.floor(w/3)),bigAlienChance:Math.min(0.35,w*0.04),fastAlienChance:Math.min(0.4,w*0.05),scorePerKill:10+w*5};}

function spawnAlien(cfg){
  const big=Math.random()<cfg.bigAlienChance,fast=!big&&Math.random()<cfg.fastAlienChance,lane=Math.random()<0.5?-1:1;
  aliens.push({x:lane===-1?-40:W+40,y:300+Math.random()*180,tx:80+Math.random()*(W-160),ty:300+Math.random()*180,phase:'approach',speed:fast?cfg.speed*1.7:big?cfg.speed*0.6:cfg.speed,hp:big?cfg.hp*2:cfg.hp,maxHp:big?cfg.hp*2:cfg.hp,big,fast,size:big?36:fast?20:28,wobble:Math.random()*Math.PI*2,wobbleSpeed:1.5+Math.random(),color:fast?'#ff4488':big?'#ff8800':'#7fff7f',score:big?cfg.scorePerKill*3:fast?cfg.scorePerKill*2:cfg.scorePerKill,attackTimer:0,beam:null});
}

function spawnParticles(x,y,color,count=12){for(let i=0;i<count;i++){const a=(Math.PI*2*i)/count+Math.random()*0.5,sp=50+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.8+Math.random()*0.6,size:2+Math.random()*4,color});}}
function spawnExplosion(x,y,radius,color){explosions.push({x,y,radius,maxRadius:radius,life:1,color});}
function clientToCanvas(ex,ey){const r=canvas.getBoundingClientRect();return{x:(ex-r.left)*(W/r.width),y:(ey-r.top)*(H/r.height)};}

function handleShoot(cx,cy){
  if(state!=='playing'||ammo<=0||reloading)return;
  ammo--;throwing=true;throwAnim=0;updateAmmoBar();sfxThrow();
  const dx=cx-squachX,dy=cy-(H-80),dist=Math.sqrt(dx*dx+dy*dy);
  stones.push({x:squachX,y:H-80,vx:(dx/dist)*520,vy:(dy/dist)*520,trail:[],age:0});
  if(ammo===0){reloading=true;reloadTimer=Math.max(0.8,2.5-wave*0.08);}
}

canvas.addEventListener('click',e=>{const p=clientToCanvas(e.clientX,e.clientY);handleShoot(p.x,p.y);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=clientToCanvas(e.touches[0].clientX,e.touches[0].clientY);handleShoot(p.x,p.y);},{passive:false});
canvas.addEventListener('mousemove',e=>{const p=clientToCanvas(e.clientX,e.clientY);squachX=Math.max(30,Math.min(W-30,p.x));});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const p=clientToCanvas(e.touches[0].clientX,e.touches[0].clientY);squachX=Math.max(30,Math.min(W-30,p.x));},{passive:false});

function updateAmmoBar(){const b=document.getElementById('ammoBar');b.innerHTML='';for(let i=0;i<maxAmmo;i++){const p=document.createElement('div');p.className='ammo-pip'+(i<ammo?'':' empty');b.appendChild(p);}}
function updateHUD(){document.getElementById('scoreDisplay').textContent=score;document.getElementById('waveDisplay').textContent=wave;const row=document.getElementById('treesRow');row.innerHTML='';for(let i=0;i<5;i++){const t=document.createElement('div');t.className='tree-icon'+(i<trees?'':' dead');t.textContent='🌲';row.appendChild(t);}}
function showScorePopup(x,y,val){const el=document.createElement('div');el.className='score-popup';el.textContent='+'+val;const r=canvas.getBoundingClientRect();el.style.left=(r.left+x*(r.width/W))+'px';el.style.top=(r.top+y*(r.height/H))+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),900);}
function showWaveBanner(text){const b=document.getElementById('waveBanner');b.textContent=text;b.className='show';setTimeout(()=>b.className='',2100);}

function startGame(){
  score=0;wave=1;trees=5;ammo=maxAmmo;stones=[];aliens=[];particles=[];explosions=[];
  reloading=false;reloadTimer=0;spawnTimer=0;
  const cfg=getWaveConfig(wave);waveGoal=cfg.goal;waveKills=0;waveAliens=0;
  ['startScreen','gameOverScreen','levelScreen'].forEach(id=>document.getElementById(id).style.display='none');
  state='playing';updateHUD();updateAmmoBar();showWaveBanner('WAVE 1 — BEGIN');
  startMusic();lastTime=performance.now();requestAnimationFrame(loop);
}

function nextWave(){
  wave++;stones=[];aliens=[];particles=[];reloading=false;reloadTimer=0;spawnTimer=0;ammo=maxAmmo;
  const cfg=getWaveConfig(wave);waveGoal=cfg.goal;waveKills=0;waveAliens=0;
  document.getElementById('levelScreen').style.display='none';
  state='playing';updateHUD();updateAmmoBar();showWaveBanner('WAVE '+wave+' — INCOMING');
  lastTime=performance.now();requestAnimationFrame(loop);
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────
let globalScores=[];
function getLocalScores(){try{return JSON.parse(localStorage.getItem('squach_scores')||'[]');}catch(e){return[];}}
function saveLocalScores(s){localStorage.setItem('squach_scores',JSON.stringify(s));}
function isHighScore(sc){const s=globalScores.length>0?globalScores:getLocalScores();return s.length<10||sc>(s[s.length-1]?.score||0);}

function renderLeaderboard(containerId,highlightScore=null){
  const scores=globalScores.length>0?globalScores:getLocalScores();
  const el=document.getElementById(containerId);if(!el)return;
  if(scores.length===0){el.innerHTML='<div class="lb-title" style="color:#444;">NO SCORES YET — BE FIRST</div>';return;}
  const medals=['gold','silver','bronze'];
  el.innerHTML='<div class="lb-title">🌍 HALL OF ACERS</div>'+scores.map((s,i)=>{
    const cls=medals[i]||(s.score===highlightScore?'highlight':'normal');
    const rank=i===0?'👑':'#'+(i+1);
    return`<div class="lb-row ${cls}"><span class="lb-rank">${rank}</span><span class="lb-name">${s.name}</span><span class="lb-score">${s.score.toLocaleString()}</span><span class="lb-wave">W${s.wave}</span></div>`;
  }).join('');
}

function gameOver(){
  state='gameover';stopMusic();sfxGameOver();
  if(score>highScore){highScore=score;localStorage.setItem('squach_hs',highScore);}
  document.getElementById('finalScore').textContent=score.toLocaleString();
  document.getElementById('gameOverScreen').style.display='flex';
  const ns=document.getElementById('nameEntrySection'),inp=document.getElementById('playerNameInput');
  if(isHighScore(score)&&score>0){ns.style.display='flex';inp.value='';setTimeout(()=>inp.focus(),300);renderLeaderboard('leaderboard',null);}
  else{ns.style.display='none';renderLeaderboard('leaderboard',score);}
}

function submitScore(){
  const name=document.getElementById('playerNameInput').value.trim()||'ACER';
  if(window._fbSubmitScore)window._fbSubmitScore(name,score,wave);
  const local=getLocalScores();local.push({name:name.toUpperCase(),score,wave,date:Date.now()});
  local.sort((a,b)=>b.score-a.score);saveLocalScores(local.slice(0,10));
  document.getElementById('nameEntrySection').style.display='none';
  renderLeaderboard('leaderboard',score);sfxWaveClear();
}

document.addEventListener('firebaseReady',()=>{
  if(window._fbListenScores){window._fbListenScores((scores)=>{globalScores=scores;renderLeaderboard('leaderboard',null);renderLeaderboard('startLeaderboard',null);});}
});

function levelUp(){
  state='levelup';sfxWaveClear();
  const msgs=['Faster aliens incoming.\nStay sharp, Acer.','They\'re angrier now.\nHold the line.','Bigger ships detected.\nAim true.','They\'ve called reinforcements.\nDon\'t flinch.','Maximum alert.\nThe forest needs you.'];
  document.getElementById('levelBadge').textContent='WAVE '+(wave+1);
  document.getElementById('levelDesc').textContent=msgs[Math.min(wave,msgs.length-1)];
  document.getElementById('levelScreen').style.display='flex';
}

function drawBackground(t){
  const sky=ctx.createLinearGradient(0,0,0,H*0.65);sky.addColorStop(0,'#030818');sky.addColorStop(1,'#0d1a3a');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.65);
  const ground=ctx.createLinearGradient(0,H*0.65,0,H);ground.addColorStop(0,'#0a1f0a');ground.addColorStop(1,'#050f05');ctx.fillStyle=ground;ctx.fillRect(0,H*0.65,W,H*0.35);
  ctx.strokeStyle='#1a4a1a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H*0.65);ctx.lineTo(W,H*0.65);ctx.stroke();
  drawTrees(t);
  ctx.save();ctx.shadowBlur=30;ctx.shadowColor='#aaccff';ctx.fillStyle='#ddeeff';ctx.beginPath();ctx.arc(W*0.78,120,28,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore();
}

function drawTrees(t){
  const tx=[60,130,220,350,430];
  for(let i=0;i<5;i++){
    const alive=i<trees,sway=Math.sin(t*0.8+i)*(alive?2:0);
    ctx.save();ctx.translate(tx[i],H*0.65);
    if(alive){
      ctx.strokeStyle='#3a2a1a';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(sway,0);ctx.lineTo(sway,-60);ctx.stroke();
      for(let l=0;l<3;l++){ctx.globalAlpha=treeDamageFlash>0?0.5:1;ctx.fillStyle=['#1a4a1a','#226622','#2a7a2a'][l];ctx.beginPath();ctx.arc(sway,-60-l*20,28-l*5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    }else{ctx.globalAlpha=0.25;ctx.strokeStyle='#332211';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-50);ctx.moveTo(-12,-20);ctx.lineTo(0,-30);ctx.moveTo(12,-35);ctx.lineTo(0,-40);ctx.stroke();ctx.globalAlpha=1;}
    ctx.restore();
  }
}

function drawSquach(t){
  const bounce=Math.sin(squachAnim)*3,throwOffset=throwing?Math.sin(throwAnim*Math.PI)*-15:0;
  ctx.save();ctx.translate(squachX,H-40+bounce);
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(0,10,25,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2a1a';ctx.beginPath();ctx.ellipse(0,-30,20,30,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a3522';ctx.beginPath();ctx.arc(0,-65,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.shadowBlur=8;ctx.shadowColor='#FFD700';ctx.beginPath();ctx.arc(-6,-67,3.5,0,Math.PI*2);ctx.arc(6,-67,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#3a2a1a';ctx.save();ctx.translate(16+(throwing?throwOffset:0),-45);
  if(throwing)ctx.rotate(throwOffset*0.06);
  ctx.beginPath();ctx.ellipse(0,0,8,20,-0.3,0,Math.PI*2);ctx.fill();
  if(throwing){ctx.fillStyle='#aaaaaa';ctx.shadowBlur=6;ctx.shadowColor='#fff';ctx.beginPath();ctx.arc(8,-18+throwOffset,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  ctx.restore();ctx.restore();
}

function drawAlien(a,t){
  ctx.save();ctx.translate(a.x,a.y+Math.sin(a.wobble+t*a.wobbleSpeed)*6);
  ctx.shadowBlur=a.big?30:18;ctx.shadowColor=a.color;
  ctx.fillStyle=a.color;ctx.beginPath();ctx.ellipse(0,0,a.size,a.size*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=a.big?'#ffcc44':a.fast?'#ff88cc':'#aaffaa';ctx.beginPath();ctx.ellipse(0,-a.size*0.2,a.size*0.5,a.size*0.45,0,Math.PI,0);ctx.fill();
  const lc=['#ff0','#f00','#0ff'];
  for(let i=-1;i<=1;i++){ctx.fillStyle=lc[i+1];ctx.shadowColor=lc[i+1];ctx.shadowBlur=8;ctx.beginPath();ctx.arc(i*a.size*0.45,a.size*0.1,3,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;
  if(a.maxHp>1){const bw=a.size*2,r=a.hp/a.maxHp;ctx.fillStyle='#333';ctx.fillRect(-bw/2,-a.size-12,bw,4);ctx.fillStyle=r>0.5?'#4f4':r>0.25?'#ff0':'#f44';ctx.fillRect(-bw/2,-a.size-12,bw*r,4);}
  if(a.beam){const grad=ctx.createLinearGradient(0,a.size*0.2,0,H*0.65-a.y);grad.addColorStop(0,'rgba(127,255,127,0.4)');grad.addColorStop(1,'rgba(127,255,127,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(-a.size*0.5,a.size*0.2);ctx.lineTo(a.size*0.5,a.size*0.2);ctx.lineTo(a.size*0.8,H*0.65-a.y);ctx.lineTo(-a.size*0.8,H*0.65-a.y);ctx.closePath();ctx.fill();}
  ctx.restore();
}

function drawStone(s){
  const alpha=Math.min(1,s.age*4);
  for(let i=0;i<s.trail.length;i++){ctx.fillStyle=`rgba(201,168,76,${(i/s.trail.length)*0.5*alpha})`;ctx.beginPath();ctx.arc(s.trail[i].x,s.trail[i].y,6*(i/s.trail.length),0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.globalAlpha=alpha;ctx.shadowBlur=15;ctx.shadowColor='#FFD700';
  ctx.fillStyle='#ccbbaa';ctx.beginPath();ctx.arc(s.x,s.y,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(s.x-2,s.y-2,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
}

function drawParticle(p){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}
function drawExplosion(e){ctx.save();ctx.globalAlpha=e.life*0.4;ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.shadowBlur=20;ctx.shadowColor=e.color;ctx.beginPath();ctx.arc(e.x,e.y,e.maxRadius*(1-e.life),0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();}

function drawWaveProgress(){
  const bw=W-40,progress=Math.min(1,waveAliens>0?waveKills/(waveGoal+3):0);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(20,58,bw,4);
  const grad=ctx.createLinearGradient(20,0,20+bw,0);grad.addColorStop(0,'#C9A84C');grad.addColorStop(1,'#FFD700');
  ctx.fillStyle=grad;ctx.fillRect(20,58,bw*progress,4);
}

function drawReloadIndicator(){
  if(!reloading)return;
  const maxT=Math.max(0.8,2.5-wave*0.08),progress=1-reloadTimer/maxT;
  ctx.save();ctx.translate(squachX,H-110);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#FFD700';ctx.shadowBlur=8;ctx.shadowColor='#FFD700';
  ctx.beginPath();ctx.arc(0,0,14,-Math.PI/2,-Math.PI/2+Math.PI*2*progress);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

function update(dt,t){
  squachAnim+=dt*3;
  if(throwing){throwAnim+=dt*5;if(throwAnim>=1){throwing=false;throwAnim=0;}}
  if(screenShake>0)screenShake-=dt*5;
  if(treeDamageFlash>0)treeDamageFlash-=dt*3;
  if(reloading){reloadTimer-=dt;if(reloadTimer<=0){reloading=false;ammo=maxAmmo;updateAmmoBar();}}

  const cfg=getWaveConfig(wave),spawnCap=waveGoal+3;
  if(waveAliens<spawnCap){spawnTimer-=dt;if(spawnTimer<=0){spawnAlien(cfg);waveAliens++;spawnTimer=cfg.spawnRate*(0.7+Math.random()*0.6);}}
  if(state==='playing'&&waveAliens>=spawnCap&&aliens.length===0){state='levelup_pending';setTimeout(levelUp,800);}

  for(let i=aliens.length-1;i>=0;i--){
    const a=aliens[i];a.wobble+=dt;
    if(a.phase==='approach'){const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<5){a.phase='descend';}else{a.x+=(dx/dist)*a.speed*dt;a.y+=(dy/dist)*a.speed*dt*0.5;}}
    else if(a.phase==='descend'){a.y+=a.speed*dt*0.4;if(a.y>=H*0.65-a.size){a.y=H*0.65-a.size;a.phase='attack';a.beam=true;a.attackTimer=2.5+Math.random();}}
    else if(a.phase==='attack'){a.attackTimer-=dt;if(a.attackTimer<=0){trees--;treeDamageFlash=1;screenShake=0.5;updateHUD();spawnParticles(a.x,H*0.65,'#00ff44',20);spawnExplosion(a.x,H*0.65,60,'#00ff44');sfxTreeHit();a.beam=false;aliens.splice(i,1);waveKills++;if(trees<=0){gameOver();return;}}}
  }

  for(let i=stones.length-1;i>=0;i--){
    const s=stones[i];s.trail.push({x:s.x,y:s.y});if(s.trail.length>10)s.trail.shift();
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.age+=dt;
    if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50){stones.splice(i,1);continue;}
    let hit=false;
    for(let j=aliens.length-1;j>=0;j--){
      const a=aliens[j];
      if(Math.sqrt((s.x-a.x)**2+(s.y-a.y)**2)<a.size+6){
        a.hp--;sfxHit();spawnParticles(s.x,s.y,a.color,a.big?20:12);
        if(a.hp<=0){sfxExplode();spawnExplosion(a.x,a.y,a.big?70:45,a.color);spawnParticles(a.x,a.y,a.color,a.big?30:18);score+=a.score;waveKills++;showScorePopup(a.x,a.y,a.score);aliens.splice(j,1);}
        stones.splice(i,1);hit=true;break;
      }
    }
    if(hit)updateHUD();
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=80*dt;p.life-=p.decay*dt;if(p.life<=0)particles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){explosions[i].life-=dt*2;if(explosions[i].life<=0)explosions.splice(i,1);}
}

function loop(timestamp){
  if(state!=='playing'&&state!=='levelup_pending')return;
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;const t=timestamp/1000;
  update(dt,t);
  ctx.save();
  if(screenShake>0){const s=screenShake*8;ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);}
  drawBackground(t);drawWaveProgress();drawReloadIndicator();
  explosions.forEach(drawExplosion);aliens.forEach(a=>drawAlien(a,t));
  stones.forEach(drawStone);particles.forEach(drawParticle);drawSquach(t);
  ctx.restore();requestAnimationFrame(loop);
}

// ─── AUDIO ───────────────────────────────────────────────────────────────
let audioCtx=null,musicNodes={},musicPlaying=false,muteBtn;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,type,duration,vol=0.3,delay=0){const ac=getAudio(),osc=ac.createOscillator(),gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type=type;osc.frequency.setValueAtTime(freq,ac.currentTime+delay);gain.gain.setValueAtTime(0,ac.currentTime+delay);gain.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+duration);osc.start(ac.currentTime+delay);osc.stop(ac.currentTime+delay+duration+0.05);}
function sfxThrow(){playTone(200,'sawtooth',0.08,0.15);playTone(400,'sine',0.06,0.1,0.04);}
function sfxHit(){const ac=getAudio(),buf=ac.createBuffer(1,ac.sampleRate*0.12,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=ac.createBufferSource(),gain=ac.createGain(),filter=ac.createBiquadFilter();filter.type='bandpass';filter.frequency.value=800;src.buffer=buf;src.connect(filter);filter.connect(gain);gain.connect(ac.destination);gain.gain.setValueAtTime(0.4,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);src.start();src.stop(ac.currentTime+0.15);}
function sfxExplode(){const ac=getAudio(),buf=ac.createBuffer(1,ac.sampleRate*0.35,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.6);const src=ac.createBufferSource(),gain=ac.createGain(),filter=ac.createBiquadFilter();filter.type='lowpass';filter.frequency.value=300;src.buffer=buf;src.connect(filter);filter.connect(gain);gain.connect(ac.destination);gain.gain.setValueAtTime(0.6,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);src.start();src.stop(ac.currentTime+0.4);}
function sfxTreeHit(){playTone(80,'sawtooth',0.4,0.5);playTone(60,'sine',0.5,0.3,0.05);}
function sfxWaveClear(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.25,0.3,i*0.12));}
function sfxGameOver(){[400,300,200,100].forEach((f,i)=>playTone(f,'sawtooth',0.4,0.4,i*0.2));}

function startMusic(){
  if(musicPlaying)return;const ac=getAudio();musicPlaying=true;
  const masterGain=ac.createGain();masterGain.gain.value=0.18;masterGain.connect(ac.destination);musicNodes.master=masterGain;
  const BPM=128,step=60/BPM/4;
  const bassNotes=[55,55,82,55,73,55,82,73,55,55,82,55,65,55,82,65];let bassStep=0,bassTime=ac.currentTime+0.1;
  function scheduleBass(){if(!musicPlaying)return;while(bassTime<ac.currentTime+0.4){const freq=bassNotes[bassStep%bassNotes.length],osc=ac.createOscillator(),gain=ac.createGain(),filter=ac.createBiquadFilter();filter.type='lowpass';filter.frequency.value=400;osc.type='sawtooth';osc.frequency.value=freq;osc.connect(filter);filter.connect(gain);gain.connect(masterGain);gain.gain.setValueAtTime(0,bassTime);gain.gain.linearRampToValueAtTime(0.6,bassTime+0.01);gain.gain.exponentialRampToValueAtTime(0.001,bassTime+step*1.8);osc.start(bassTime);osc.stop(bassTime+step*2);bassStep++;bassTime+=step*2;}musicNodes.bassTimer=setTimeout(scheduleBass,150);}
  const arpNotes=[220,277,330,415,330,277,220,165,196,247,330,392,330,247,196,165];let arpStep=0,arpTime=ac.currentTime+0.1;
  function scheduleArp(){if(!musicPlaying)return;while(arpTime<ac.currentTime+0.4){const freq=arpNotes[arpStep%arpNotes.length],osc=ac.createOscillator(),gain=ac.createGain();osc.type='square';osc.frequency.value=freq;osc.connect(gain);gain.connect(masterGain);gain.gain.setValueAtTime(0,arpTime);gain.gain.linearRampToValueAtTime(0.25,arpTime+0.005);gain.gain.exponentialRampToValueAtTime(0.001,arpTime+step*0.85);osc.start(arpTime);osc.stop(arpTime+step);arpStep++;arpTime+=step;}musicNodes.arpTimer=setTimeout(scheduleArp,150);}
  let kickTime=ac.currentTime+0.1;
  function scheduleKick(){if(!musicPlaying)return;while(kickTime<ac.currentTime+0.4){const osc=ac.createOscillator(),gain=ac.createGain();osc.type='sine';osc.frequency.setValueAtTime(160,kickTime);osc.frequency.exponentialRampToValueAtTime(40,kickTime+0.08);osc.connect(gain);gain.connect(masterGain);gain.gain.setValueAtTime(1.2,kickTime);gain.gain.exponentialRampToValueAtTime(0.001,kickTime+0.25);osc.start(kickTime);osc.stop(kickTime+0.3);kickTime+=step*8;}musicNodes.kickTimer=setTimeout(scheduleKick,150);}
  let hatTime=ac.currentTime+0.1;
  function scheduleHat(){if(!musicPlaying)return;while(hatTime<ac.currentTime+0.4){const buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource(),gain=ac.createGain(),filter=ac.createBiquadFilter();filter.type='highpass';filter.frequency.value=8000;src.buffer=buf;src.connect(filter);filter.connect(gain);gain.connect(masterGain);gain.gain.setValueAtTime(0.3,hatTime);gain.gain.exponentialRampToValueAtTime(0.001,hatTime+0.04);src.start(hatTime);src.stop(hatTime+0.05);hatTime+=step*2;}musicNodes.hatTimer=setTimeout(scheduleHat,150);}
  scheduleBass();scheduleArp();scheduleKick();scheduleHat();
}

function stopMusic(){musicPlaying=false;clearTimeout(musicNodes.bassTimer);clearTimeout(musicNodes.arpTimer);clearTimeout(musicNodes.kickTimer);clearTimeout(musicNodes.hatTimer);if(musicNodes.master){try{musicNodes.master.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.3);}catch(e){}}musicNodes={};}
function toggleMute(){if(musicPlaying){stopMusic();muteBtn.textContent='🔇';}else{startMusic();muteBtn.textContent='🔊';}}

// ─── INIT ─────────────────────────────────────────────────────────────────
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('nextWaveBtn').onclick=nextWave;
document.getElementById('saveScoreBtn').onclick=submitScore;
document.getElementById('playerNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitScore();});

(function(){const div=document.createElement('div');div.style.cssText='position:absolute;bottom:55px;left:0;right:0;padding:0 16px;pointer-events:none;';div.id='startLeaderboard';document.getElementById('startScreen').appendChild(div);renderLeaderboard('startLeaderboard');})();

muteBtn=document.createElement('button');muteBtn.textContent='🔊';muteBtn.style.cssText='position:absolute;top:10px;right:10px;z-index:50;background:rgba(0,0,0,0.5);border:1px solid #C9A84C;color:#FFD700;font-size:16px;padding:4px 8px;cursor:pointer;border-radius:4px;';muteBtn.onclick=toggleMute;document.getElementById('gameContainer').appendChild(muteBtn);

document.getElementById('hsStart').textContent=highScore;
updateAmmoBar();

(function titleDraw(ts){if(state!=='start')return;ctx.clearRect(0,0,W,H);drawBackground(ts/1000);requestAnimationFrame(titleDraw);})(0);
</script>
