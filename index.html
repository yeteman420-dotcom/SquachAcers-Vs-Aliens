<!DOCTYPE html>
<html>
<head>
    <title>SquachAcers vs Aliens</title>
    <style>
        canvas { background: #1a1a1a; display: block; margin: 0 auto; border: 2px solid #4CAF50; }
        body { background: #000; color: white; text-align: center; font-family: Arial; }
    </style>
</head>
<body>
    <h1>SQUACHACERS: THE INVASION</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Use Arrow Keys to Move | Space to "Slam" (Swing Racket)</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let squach = { x: 50, y: 200, size: 40, color: "#2E7D32" };
        let alien = { x: 700, y: 200, size: 30, color: "#FF5252", speed: 2 };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Squach (The Hero)
            ctx.fillStyle = squach.color;
            ctx.fillRect(squach.x, squach.y, squach.size, squach.size);

            // Draw Alien
            ctx.fillStyle = alien.color;
            ctx.fillRect(alien.x, alien.y, alien.size, alien.size);

            // Simple Alien AI (Move toward Squach)
            if (alien.x > squach.x) alien.x -= alien.speed;
            
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
